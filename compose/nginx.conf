events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;
        absolute_redirect off;

        # Frontend — pass full URI as-is; frontend serves at /MycoMSBase
        location /MycoMSBase/ {
            set $frontend mb3frontend:3000;
            proxy_pass http://$frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /MycoMSBase;
            proxy_intercept_errors on;
            error_page 404 = /MycoMSBase/index.html;
        }

        # API — pass full URI as-is; server serves at /MycoMSBase-api
        location /MycoMSBase-api/ {
            set $api mb3server:8080;
            proxy_pass http://$api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization";
                return 204;
            }
        }

        # Similarity service — strip /similarity/ prefix before forwarding
        location /similarity/ {
            set $similarity similarity-service:8080;
            rewrite ^/similarity/(.*)$ /$1 break;
            proxy_pass http://$similarity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Export service — strip /export/ prefix before forwarding
        location /export/ {
            set $export export-service:8080;
            rewrite ^/export/(.*)$ /$1 break;
            proxy_pass http://$export;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Root redirect to frontend
        location = / {
            return 301 /MycoMSBase/;
        }

        # Catch-all — pass full URI as-is
        location / {
            set $frontend_catch mb3frontend:3000;
            proxy_pass http://$frontend_catch;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
